<!DOCTYPE html>
<html lang="EN">
<head>
  <meta charset="UTF-8">
  <title>Firefly Detail - Mnemosyne</title>
  <script src="./assets/vendor/vue.global.prod.js"></script>
  <script src="./assets/vendor/echarts.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app" class="container">
    <header>
      <h1 onclick="window.location.href='./index.html'" style="cursor:pointer;">Expense Dashboard</h1>
      <div style="font-size: var(--fs-xl); font-weight: 500;">Firefly Overview</div>
    </header>

    <date-filter :years="availableYears"
                 v-model:year="selectedYear"
                 :show-month="false"
                 @change="fetchData">
    </date-filter>

    <h3>流萤相关支出热力图</h3>
    <div ref="heatmapRef" style="width: 100%; height: 250px; margin-top: 20px;"></div>

    <div v-if="selectedDate" class="details-section" style="border-top: 1px solid var(--color-border); margin-top: 20px;">
      <h3>消费详情 {{ selectedDate }}</h3>
      <table class="data-table">
        <thead>
          <tr>
            <th width="75%">项目 / ITEM</th>
            <th width="25%" style="text-align: right;">金额 / AMOUNT</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="item in dailyDetails" :key="item.id">
            <td>{{ item.itemName }}</td>
            <td style="text-align: right;">¥ {{ formatCurrency(item.amount) }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <h3>流萤相关支出占比</h3>
    <div ref="shareBarRef" style="width: 100%; height: 320px;"></div>
  </div>

  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/charts.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/firefly_detail.js"></script>
</body>
</html>
