<!DOCTYPE html>
<html lang="EN">
<head>
  <meta charset="UTF-8">
  <title>Firefly Detail - Mnemosyne</title>
  <script src="./assets/vendor/vue.global.prod.js"></script>
  <script src="./assets/vendor/echarts.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app" class="container">
    <header>
      <h1 onclick="window.location.href='./index.html'" style="cursor:pointer;">Expense Dashboard</h1>
      <div style="font-size: var(--fs-xl); font-weight: 500;">
        Firefly Overview
      </div>
    </header>

    <div style="margin-bottom: 30px;">
      <date-filter :years="availableYears"
                   v-model:year="selectedYear"
                   :show-month="false"
                   @change="fetchData">
      </date-filter>
    </div>

    <div class="dashboard-layout">
      <div class="chart-card">
        <h2>支出热力图 / HEATMAP</h2>
        <div ref="heatmapRef" style="width: 100%; height: 250px;"></div>
      </div>

      <div v-if="selectedDate" class="records-section">
      <h2>
        <span>消费明细<span class="subtitle">Transaction History of {{selectedDate}}</span></span>
      </h2>

        <div class="receipt-wrapper">
          <div class="receipt-group">
            <div class="receipt-group-header">
              <span>项目 / ITEM</span>
              <span>金额 / AMOUNT</span>
            </div>

            <div class="receipt-item" v-for="item in dailyDetails" :key="item.id">
              <div class="receipt-item-main">
                <div class="receipt-item-name">{{ item.itemName }}</div>
              </div>
              <div class="receipt-item-amount">
                ¥ {{ formatCurrency(item.amount) }}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="chart-card">
        <h2>支出占比 / SHARE</h2>
        <div ref="shareBarRef" style="width: 100%; height: 320px;"></div>
      </div>
    </div>

  </div>

  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/charts.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/firefly_detail.js"></script>
</body>
</html>
