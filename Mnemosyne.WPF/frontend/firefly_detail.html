<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset="UTF-8">
    <title>Firefly Detail - Mnemosyne</title>
    <script src="./assets/vendor/vue.global.prod.js"></script>
    <script src="./assets/vendor/echarts.min.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app" class="container">
        <header>
            <h1 onclick="window.location.href='./index.html'" style="cursor:pointer;">Expense Dashboard</h1>
            <div style="font-size: var(--fs-xl); font-weight: 500;">Firefly Overview</div>
        </header>

        <div class="filter-section" style="margin: 20px 0; background: var(--bg-card); padding: 15px; border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: flex-end; gap: 10px;">
            <label for="yearSelector" style="font-weight: 500;">选择年份:</label>
            <select id="yearSelector" v-model="selectedYear" @change="fetchData" style="padding: 6px 12px; border: 1px solid var(--color-border); background-color: var(--bg-main);">
                <option v-for="year in availableYears" :key="year" :value="year">{{ year }}</option>
            </select>
        </div>

        <div ref="heatmapRef" style="width: 100%; height: 250px; margin-top: 20px;"></div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/charts.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/firefly_detail.js"></script>
</body>
</html>
