<!DOCTYPE html>
<html lang="EN">
<head>
  <meta charset="UTF-8">
  <title>Year Detail - Mnemosyne</title>
  <script src="./assets/vendor/vue.global.prod.js"></script>
  <script src="./assets/vendor/echarts.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app" class="container">
    <header>
      <h1 onclick="window.location.href='./index.html'" style="cursor:pointer;">Expense Dashboard</h1>
      <div style="font-size: var(--fs-xl); font-weight: 500;">Annual Overview</div>
    </header>

    <date-filter :years="availableYears"
                 v-model:year="selectedYear"
                 :show-month="false"
                 @change="fetchData">
    </date-filter>

    <div class="dashboard-layout">
      <div class="chart-card">
        <h2>支出热力图 / HEATMAP</h2>
        <div ref="heatmapRef" style="width: 100%; height: 250px"></div>
      </div>
    </div>
  </div>

  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/charts.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/year_detail.js"></script>
</body>
</html>
